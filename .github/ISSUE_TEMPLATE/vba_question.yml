name: 💬 質問・相談（VBA）
description: VBA実装に関する技術的な質問や設計の相談を投げる
title: "[QUESTION] "
labels: ["question"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 質問・相談フォーム
        疑問点や相談内容を記入してください。
        解決したらIssueをクローズしてください。

  - type: dropdown
    id: area
    attributes:
      label: 質問の領域
      options:
        - VBA構文・言語仕様
        - Excel操作（セル・シート・ブック）
        - ファイル入出力（ADODB・FileSystemObject）
        - パフォーマンス・最適化
        - エラー処理
        - モジュール設計・アーキテクチャ
        - その他
    validations:
      required: true

  - type: textarea
    id: question
    attributes:
      label: 質問・相談内容
      description: 何を知りたいか、何で迷っているかを具体的に書いてください。
      placeholder: 例）VBAのAnd演算子は短絡評価するか知りたい。
    validations:
      required: true

  - type: textarea
    id: tried
    attributes:
      label: 試したこと・調べたこと
      description: すでに試したこと、調べたことを記入してください。
      placeholder: |
        - VBA注意事項.md を確認したが…
        - ○○で試したが△△という結果になった

  - type: textarea
    id: context
    attributes:
      label: 関連するコードスニペット
      description: 関係するコードがあれば貼ってください。
      render: vb

  - type: input
    id: deadline
    attributes:
      label: 回答希望期限（任意）
      placeholder: 例）2026-05-01

  - type: checkboxes
    id: checklist
    attributes:
      label: 確認事項
      options:
        - label: VBA注意事項.md を確認した
          required: true
        - label: 既存のIssueを検索した
          required: true
