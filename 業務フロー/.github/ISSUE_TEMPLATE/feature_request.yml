name: ✨ 機能リクエスト
description: 新機能や改善案を提案する
title: "[FEAT] "
labels: ["enhancement"]
assignees: []

body:
  - type: markdown
    attributes:
      value: |
        ## 機能リクエストフォーム
        提案内容をわかりやすく記入してください。

  - type: input
    id: summary
    attributes:
      label: 機能の概要（一行）
      description: 提案する機能を一行で表現してください。
      placeholder: 例）ダッシュボードにCSVエクスポート機能を追加する
    validations:
      required: true

  - type: dropdown
    id: category
    attributes:
      label: カテゴリ
      options:
        - 新機能
        - 既存機能の改善
        - パフォーマンス改善
        - UX/UI改善
        - ドキュメント改善
        - その他
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: 優先度（提案者視点）
      options:
        - 高（業務上必須）
        - 中（あると便利）
        - 低（あればよい）
    validations:
      required: true

  - type: textarea
    id: problem
    attributes:
      label: 解決したい課題・背景
      description: なぜこの機能が必要か、現状どんな問題があるかを説明してください。
      placeholder: 例）毎月データをExcelに手作業でコピーしており、ミスが発生しやすい。
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: 提案する解決策
      description: どのような機能・動作を期待しますか？
      placeholder: 例）一覧画面に「CSVエクスポート」ボタンを追加し、表示中のデータをそのまま出力できるようにする。
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: 検討した代替案
      description: 他に検討した方法があれば記入してください。（任意）
      placeholder: 例）ブラウザの印刷機能で対応を試みたが、フォーマットが崩れてしまう。

  - type: textarea
    id: acceptance
    attributes:
      label: 受け入れ条件（Definition of Done）
      description: この機能が「完成した」と言える条件を記入してください。（任意）
      value: |
        - [ ] 
        - [ ] 
        - [ ] 

  - type: checkboxes
    id: checklist
    attributes:
      label: 提出前チェックリスト
      options:
        - label: 同様のリクエストが既存Issueにないか確認した
          required: true
        - label: ロードマップやDiscussionを確認した
